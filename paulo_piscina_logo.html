<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulo Piscina — Logo Cinzel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12121f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    gap: 40px;
  }

  .hint {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
  }

  /* ===== LOGO CARD ===== */
  .logo-card {
    background: linear-gradient(135deg, #caf0f8 0%, #90e0ef 100%);
    border-radius: 28px;
    width: 480px;
    height: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 40px 100px rgba(0, 150, 199, 0.25), 0 10px 30px rgba(0,0,0,0.5);
  }

  .logo-sun { width: 68px; height: 68px; margin-bottom: 8px; }

  .cinzel-name {
    font-family: 'Cinzel', serif;
    font-size: 3.4rem;
    font-weight: 900;
    color: #023e8a;
    letter-spacing: 6px;
    line-height: 1;
  }

  .cinzel-piscina {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: #0077b6;
    letter-spacing: 12px;
    text-transform: uppercase;
  }

  .drops { display: flex; gap: 6px; margin-top: 6px; }
  .drop {
    width: 10px; height: 14px;
    background: #0077b6;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform: rotate(180deg);
    opacity: 0.45;
  }
  .drop:nth-child(2) { opacity: 0.7; transform: rotate(180deg) scale(1.2); }
  .drop:nth-child(3) { opacity: 0.35; }

  .sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    color: #0096c7;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  @media (max-width: 520px) {
    .logo-card { width: 320px; height: 320px; }
    .cinzel-name { font-size: 2.4rem; }
    .cinzel-piscina { font-size: 0.7rem; }
  }
</style>
</head>
<body>

  <p class="hint">Paulo Piscina · Cinzel — Romana Clássica</p>

  <div class="logo-card">
    <div class="logo-sun">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="12" fill="#0096c7"/>
        <line x1="28" y1="4" x2="28" y2="12" stroke="#0077b6" stroke-width="3" stroke-linecap="round"/>
        <line x1="28" y1="44" x2="28" y2="52" stroke="#0077b6" stroke-width="3" stroke-linecap="round"/>
        <line x1="4" y1="28" x2="12" y2="28" stroke="#0077b6" stroke-width="3" stroke-linecap="round"/>
        <line x1="44" y1="28" x2="52" y2="28" stroke="#0077b6" stroke-width="3" stroke-linecap="round"/>
        <line x1="11.5" y1="11.5" x2="17" y2="17" stroke="#0077b6" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="39" y1="39" x2="44.5" y2="44.5" stroke="#0077b6" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44.5" y1="11.5" x2="39" y2="17" stroke="#0077b6" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="17" y1="39" x2="11.5" y2="44.5" stroke="#0077b6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M18 30 C21 25, 24 25, 28 29 C32 33, 35 33, 38 28" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="cinzel-name">PAULO</div>
    <div class="cinzel-piscina">PISCINA</div>
    <div class="drops">
      <div class="drop"></div><div class="drop"></div><div class="drop"></div>
    </div>
    <div class="sub">Manutenção &amp; Limpeza</div>
  </div>

</body>
</html>
