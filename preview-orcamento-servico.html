<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — Orçamento de Serviço · Paulo Piscinas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8f4f8;
    font-family: 'Montserrat', sans-serif;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .hint {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #0077b6;
    opacity: 0.7;
  }

  /* ===== DOCUMENTO ===== */
  .doc {
    background: white;
    width: 100%;
    max-width: 820px;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(2, 62, 138, 0.12);
    overflow: hidden;
  }

  /* ===== HEADER ===== */
  .doc-header {
    background: linear-gradient(135deg, #023e8a 0%, #0077b6 60%, #0096c7 100%);
    padding: 28px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon svg { width: 52px; height: 52px; }
  .logo-text { line-height: 1; }
  .logo-nome {
    font-family: 'Cinzel', serif;
    font-size: 1.9rem;
    font-weight: 900;
    color: white;
    letter-spacing: 4px;
  }
  .logo-sub {
    font-size: 0.5rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 3px;
    display: block;
  }

  .doc-title {
    text-align: right;
    color: white;
  }
  .doc-title .orcamento-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .doc-title .orcamento-data {
    font-size: 1rem;
    font-weight: 700;
    margin-top: 4px;
  }

  /* ===== BODY ===== */
  .doc-body { padding: 28px 32px; }

  /* ===== SEÇÃO ===== */
  .section-title {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0096c7;
    border-bottom: 2px solid #caf0f8;
    padding-bottom: 6px;
    margin-bottom: 16px;
  }

  /* ===== DADOS CLIENTE ===== */
  .cliente-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin-bottom: 28px;
  }
  .campo { display: flex; flex-direction: column; gap: 3px; }
  .campo.full { grid-column: 1 / -1; }
  .campo label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0077b6;
  }
  .campo input, .campo textarea {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: #012a6e;
    border: none;
    border-bottom: 1.5px solid #caf0f8;
    padding: 6px 2px;
    outline: none;
    background: transparent;
    resize: none;
    transition: border-color 0.2s;
  }
  .campo input:focus, .campo textarea:focus {
    border-color: #0096c7;
    background: rgba(202,240,248,0.2);
    border-radius: 3px 3px 0 0;
  }
  .campo input::placeholder, .campo textarea::placeholder { color: #90e0ef; font-style: italic; }

  /* ===== TABELA SERVIÇOS ===== */
  .servicos-section { margin-bottom: 16px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  thead tr { background: #023e8a; color: white; }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  thead th.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid #e8f4f8;
    transition: background 0.15s;
  }
  tbody tr:hover { background: #f0faff; }
  tbody td {
    padding: 9px 12px;
    color: #023e8a;
    font-weight: 500;
  }
  tbody td.right { text-align: right; }
  tbody td input {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: #023e8a;
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    padding: 0;
  }
  tbody td input.right { text-align: right; }
  tbody td input:focus { background: rgba(0,150,199,0.08); border-radius: 3px; padding: 0 4px; }

  .add-linha {
    width: 100%;
    background: transparent;
    border: 1.5px dashed #90e0ef;
    border-top: none;
    padding: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: #0096c7;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-linha:hover { background: #f0faff; color: #023e8a; }

  /* ===== OBSERVAÇÕES ===== */
  .obs-section {
    margin-top: 20px;
    margin-bottom: 4px;
  }
  .obs-box {
    background: #f0faff;
    border: 1.5px solid #caf0f8;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .obs-box textarea {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    color: #023e8a;
    border: none;
    background: transparent;
    outline: none;
    width: 100%;
    resize: none;
    line-height: 1.6;
  }
  .obs-box textarea::placeholder { color: #90e0ef; font-style: italic; }

  /* ===== TOTAIS ===== */
  .totais {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2px solid #caf0f8;
  }
  .total-linha { display: flex; gap: 24px; align-items: center; }
  .total-linha .total-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0077b6;
  }
  .total-linha .total-valor {
    font-size: 0.95rem;
    font-weight: 700;
    color: #023e8a;
    min-width: 100px;
    text-align: right;
  }
  .total-linha.destaque {
    background: linear-gradient(135deg, #023e8a, #0096c7);
    padding: 10px 20px;
    border-radius: 8px;
    margin-top: 4px;
  }
  .total-linha.destaque .total-label { color: rgba(255,255,255,0.8); }
  .total-linha.destaque .total-valor { color: white; font-size: 1.1rem; }

  /* ===== FOOTER ===== */
  .doc-footer {
    background: #023e8a;
    padding: 12px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .doc-footer span {
    font-size: 0.6rem;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .doc-footer .whats {
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
  }

  /* ===== BOTÃO ===== */
  .btn-imprimir {
    background: linear-gradient(135deg, #023e8a, #0096c7);
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,150,199,0.3);
    transition: all 0.2s;
  }
  .btn-imprimir:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,150,199,0.4); }

  @media print {
    body { background: white; padding: 0; }
    .hint, .btn-imprimir, .add-linha { display: none; }
    .doc { box-shadow: none; border-radius: 0; max-width: 100%; }
    tbody td input, .campo input, .campo textarea, .obs-box textarea { border: none !important; background: transparent !important; }
  }
</style>
</head>
<body>

<p class="hint">Preview — Orçamento de Serviço · Paulo Piscinas</p>

<div class="doc">

  <!-- HEADER -->
  <div class="doc-header">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="12" fill="rgba(255,255,255,0.9)"/>
          <line x1="28" y1="4" x2="28" y2="12" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
          <line x1="28" y1="44" x2="28" y2="52" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
          <line x1="4" y1="28" x2="12" y2="28" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
          <line x1="44" y1="28" x2="52" y2="28" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round"/>
          <line x1="11.5" y1="11.5" x2="17" y2="17" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="39" y1="39" x2="44.5" y2="44.5" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="44.5" y1="11.5" x2="39" y2="17" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="17" y1="39" x2="11.5" y2="44.5" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M18 30 C21 25, 24 25, 28 29 C32 33, 35 33, 38 28" stroke="#0096c7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-nome">PAULO</div>
        <span class="logo-sub">Piscina · Manutenção &amp; Limpeza</span>
      </div>
    </div>
    <div class="doc-title">
      <div class="orcamento-label">Data do Orçamento</div>
      <div class="orcamento-data">15/04/2026</div>
    </div>
  </div>

  <!-- BODY -->
  <div class="doc-body">

    <!-- DADOS DO CLIENTE -->
    <div class="section-title">Dados do Cliente</div>
    <div class="cliente-grid">
      <div class="campo full">
        <label>Cliente</label>
        <input type="text" placeholder="Nome completo do cliente" value="João da Silva" />
      </div>
      <div class="campo full">
        <label>Endereço / Local da Piscina</label>
        <input type="text" placeholder="Rua, número, bairro" value="Rua das Acácias, 45 - Jardim das Flores" />
      </div>
      <div class="campo">
        <label>Cidade</label>
        <input type="text" placeholder="Cidade" value="Ibiúna" />
      </div>
      <div class="campo">
        <label>Telefone</label>
        <input type="text" placeholder="(00) 00000-0000" value="(15) 99888-7766" />
      </div>
    </div>

    <!-- SERVIÇOS -->
    <div class="servicos-section">
      <div class="section-title">Serviços</div>
      <table id="tabela-servicos">
        <thead>
          <tr>
            <th>Descrição do Serviço</th>
            <th class="right" style="width:130px">Valor</th>
          </tr>
        </thead>
        <tbody id="linhas-servico">
          <tr>
            <td><input type="text" placeholder="Descrição" value="Limpeza completa da piscina" /></td>
            <td class="right"><input type="number" class="right" placeholder="0,00" value="280" min="0" step="0.01" oninput="calcularTotal()" /></td>
          </tr>
          <tr>
            <td><input type="text" placeholder="Descrição" value="Tratamento químico (cloro + algicida)" /></td>
            <td class="right"><input type="number" class="right" placeholder="0,00" value="150" min="0" step="0.01" oninput="calcularTotal()" /></td>
          </tr>
          <tr>
            <td><input type="text" placeholder="Descrição" value="Limpeza do filtro e verificação da bomba" /></td>
            <td class="right"><input type="number" class="right" placeholder="0,00" value="120" min="0" step="0.01" oninput="calcularTotal()" /></td>
          </tr>
        </tbody>
      </table>
      <button class="add-linha" onclick="adicionarServico()">+ Adicionar serviço</button>
    </div>

    <!-- OBSERVAÇÕES -->
    <div class="obs-section">
      <div class="section-title">Observações</div>
      <div class="obs-box">
        <textarea rows="2" placeholder="Validade do orçamento, condições, forma de pagamento...">Orçamento válido por 7 dias. Pagamento via Pix ou dinheiro.</textarea>
      </div>
    </div>

    <!-- TOTAIS -->
    <div class="totais">
      <div class="total-linha destaque">
        <span class="total-label">Total</span>
        <span class="total-valor" id="total-geral">R$ 550,00</span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="doc-footer">
    <span>Paulo Piscinas · Manutenção &amp; Limpeza</span>
    <span class="whats">@paulo_piscinas01</span>
  </div>

</div>

<button class="btn-imprimir" onclick="window.print()">Imprimir / Salvar PDF</button>

<script>
  function formatBRL(val) {
    return 'R$ ' + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }

  function calcularTotal() {
    const inputs = document.querySelectorAll('#linhas-servico td:nth-child(2) input');
    let total = 0;
    inputs.forEach(inp => { total += parseFloat(inp.value) || 0; });
    document.getElementById('total-geral').textContent = formatBRL(total);
  }

  function adicionarServico() {
    const tbody = document.getElementById('linhas-servico');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" placeholder="Descrição do serviço" /></td>
      <td class="right"><input type="number" class="right" placeholder="0,00" value="0" min="0" step="0.01" oninput="calcularTotal()" /></td>
    `;
    tbody.appendChild(tr);
  }

  calcularTotal();
</script>

</body>
</html>
